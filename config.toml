# Update this value before live acquisition.
[device]
mac_address = "98:D3:C1:FD:FF:DB"
sampling_rate_hz = 100
channels = [0]
processed_sensor_column = 5
chunk_size = 10
queue_max_samples = 1000
timeout_s = 0.25
read_error_backoff_s = 0.05
retries = 3
retry_delay_s = 2.0
invert_signal = false

[display]
enable_plot = false
plot_window_length = 3000
debug_plot_window_bounds = true

[lsl]
enable = true
stream_name = "BreathingBelt"
stream_type = "Breathing"
source_id = "breathingbelt001"
constant_delay_s = 0.0

[filter]
# High-pass parameters are retained for backward compatibility and are ignored
# by the fixed-calibration VR control path.
hp_cutoff_hz = 0.005
hp_order = 1
lp_cutoff_hz = 0.8
lp_order = 2

[movement]
hp_cutoff_hz = 0.002
hp_order = 1
lp_cutoff_hz = 0.8
lp_order = 2
low_activity_slowdown_enabled = false

[calibration]
duration_s = 15.0
percentile_lo = 5.0
percentile_hi = 95.0
amplitude_floor = 0.001
# Extra headroom applied to the fixed control map before clamping to 0..1.
padding_ratio = 0.20

[adaptation]
# Adaptive normalization settings are retained for backward compatibility and
# are not used by the fixed-calibration VR control path.
center_enabled = true
amplitude_enabled = true
center_tau_s = 1200.0
amplitude_tau_s = 300.0
startup_duration_s = 15.0
startup_center_tau_s = 60.0
startup_amplitude_tau_s = 60.0

[hold]
enabled = true
activity_window_ms = 800
ratio_per_sec_enter = 1.5
ratio_per_sec_exit = 2.2
floor_per_sec = 0.01
edge_margin_ratio = 0.25

[output_smoothing]
enabled = true
activity_window_ms = 800
tau_active_s = 0.25
tau_extreme_s = 1.0
tau_hold_s = 8.0
activity_low_ratio_per_sec = 0.10
activity_high_ratio_per_sec = 0.50
activity_floor_per_sec = 0.01
edge_margin_ratio = 0.15

[extrema]
min_interval_ms = 800
prominence_ratio = 0.1

[raw_qc]
enabled = true
raw_saturation_lo = 1.0
raw_saturation_hi = 1022.0
flatline_epsilon = 0.5
flatline_duration_s = 2.0
baseline_ema_tau_s = 30.0
baseline_abs_dev_tau_s = 10.0
baseline_shift_sigma = 8.0
baseline_shift_floor = 50.0
warmup_s = 5.0

[output]
root_dir = "runs"
