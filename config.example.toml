[device]
mac_address = "00:00:00:00:00:00"
sampling_rate_hz = 100
channels = [0, 1]
processed_sensor_column = 5
chunk_size = 10
queue_max_samples = 1000
timeout_s = 0.25
read_error_backoff_s = 0.05
retries = 3
retry_delay_s = 2.0
invert_signal = false

[display]
enable_plot = true
plot_window_length = 200
debug_plot_window_bounds = true

[lsl]
enable = true
stream_name = "BreathingBelt"
stream_type = "Breathing"
source_id = "breathingbelt001"

[filter]
# High-pass parameters are retained for backward compatibility and are ignored
# by the fixed-calibration VR control path. The low-pass settings are used by
# legacy control mode and adaptive live mode.
hp_cutoff_hz = 0.005
hp_order = 1
lp_cutoff_hz = 1.5
lp_order = 2

[movement]
# Realtime movement-proxy mode uses a slow causal high-pass for drift removal
# followed by a light causal low-pass. During very low activity, the visible
# drift-removal response can optionally be slowed without fully freezing the trace.
hp_cutoff_hz = 0.03
hp_order = 1
lp_cutoff_hz = 1.5
lp_order = 2
low_activity_slowdown_enabled = false
low_activity_window_ms = 800
low_activity_ratio_per_sec = 0.05
low_activity_floor_per_sec = 0.01
low_activity_drift_scale = 0.15

[calibration]
duration_s = 15.0
percentile_lo = 5.0
percentile_hi = 95.0
amplitude_floor = 0.001
# Extra headroom applied to the fixed control map before clamping to 0..1.
padding_ratio = 0.20

[adaptation]
# Adaptive live mode uses these settings to update center and amplitude during
# runtime. The fixed-calibration control path still ignores them. Low-activity
# gating pauses range adaptation during quiet plateaus so long holds do not
# recentre as quickly.
center_enabled = true
amplitude_enabled = true
center_tau_s = 600.0
amplitude_tau_s = 120.0
startup_duration_s = 60.0
startup_center_tau_s = 25.0
startup_amplitude_tau_s = 25.0
low_activity_gating_enabled = true
low_activity_window_ms = 800
low_activity_ratio_per_sec = 0.05
low_activity_floor_per_sec = 0.01

[hold]
enabled = true
activity_window_ms = 500
ratio_per_sec_enter = 1.0
ratio_per_sec_exit = 1.5
floor_per_sec = 0.01
# Only the top/bottom edge zones are eligible for hold freeze.
edge_margin_ratio = 0.20

[output_smoothing]
enabled = true
activity_window_ms = 500
tau_active_s = 0.25
tau_extreme_s = 0.75
tau_hold_s = 5.0
activity_low_ratio_per_sec = 0.10
activity_high_ratio_per_sec = 0.50
activity_floor_per_sec = 0.01
edge_margin_ratio = 0.10

[extrema]
min_interval_ms = 800
prominence_ratio = 0.1

[raw_qc]
enabled = true
raw_saturation_lo = 1.0
raw_saturation_hi = 1022.0
flatline_epsilon = 0.5
flatline_duration_s = 2.0
baseline_ema_tau_s = 30.0
baseline_abs_dev_tau_s = 10.0
baseline_shift_sigma = 8.0
baseline_shift_floor = 50.0
warmup_s = 5.0

[output]
root_dir = "runs"
